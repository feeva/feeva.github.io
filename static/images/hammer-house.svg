<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" width="480" height="180">
  <g fill="none" stroke="#d97811" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- hammer: small and quick to learn -->
    <g transform="translate(90,75) rotate(35) scale(0.85)">
      <rect x="-16" y="-40" width="32" height="20" rx="4"/>
      <line x1="0" y1="-18" x2="0" y2="46"/>
    </g>

    <!-- dashed connector with arrow -->
    <line x1="170" y1="95" x2="255" y2="95" stroke-dasharray="6 8" stroke-width="4"/>
    <polyline points="243,84 260,95 243,106"/>

    <!-- house: takes real time and skill to build well -->
    <g transform="translate(345,110) scale(1.35)">
      <polyline points="-40,0 0,-38 40,0"/>
      <rect x="-32" y="0" width="64" height="46"/>
      <rect x="-11" y="19" width="20" height="27"/>
    </g>
  </g>
</svg>
