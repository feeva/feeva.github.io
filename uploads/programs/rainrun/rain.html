<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>비 맞기 시뮬레이션</title>
    <meta name="Keywords" content="비, 걷기, 뛰기, 달리기, Rain, Walk, Run">
    <meta name="description" content="비 올 때 걷거나 뛰는 속력에 따른 비 맞기 시뮬레이션">
    <meta name="og:title" content="비 맞기 시뮬레이션">
    <meta name="og:description" content="비 올 때 걷거나 뛰는 속력에 따른 비 맞기 시뮬레이션">
    <meta property="og:site_name" content="Nothing New Under the Sun" />
    <style>
body, select, button { font-family: Segoe UI, 맑은 고딕, sans-serif; font-size: 10pt;}
.highlight { font-size: 12pt; }
.highlight span { font-size: 15pt; font-weight: bold; }
    </style>
</head>
<body>

    <div style="width: 900px;">
        <div class="highlight">
            비에 맞은 양: <span id="hitCount">0</span>방울 <a href="#none" onclick="return help()">(?)</a>
        </div>

        <div id="canvasContainer" style="position: relative; border: solid 1px #ddd; height: 240px; overflow: hidden;">
            <canvas id="boyCanvas" style="width: 100%; height: 100%; position: absolute; left: 0; top: 0;"></canvas>
            <canvas id="rainCanvas" style="width: 100%; height: 100%; position: absolute; left: 0; top: 0; opacity: .5"></canvas>
        </div>

        <div id="scrollBar" style="width: 100%; overflow-x: scroll;">
            <div id="scroller" style="height: 1px;"></div>
        </div>

        <div>
            <label for="runSpeed">달리기 속력:</label>
            <select id="runSpeed">
                <option value="1">1</option><option value="2">2</option>
                <option value="3" selected>3</option><option value="4">4</option>
                <option value="5">5</option>
            </select>
            <label for="rainSpeed">바람:</label>
            <select id="rainSpeed">
                <option value="-2">-2(동풍)</option>
                <option value="-1">-1(동풍)</option>
                <option value="0" selected>없음</option>
                <option value="1">1(동풍)</option>
                <option value="2">2(서풍)</option>
            </select>
            <label for="rainDensity">비 밀도:</label>
            <select id="rainDensity">
                <option value="1">1</option><option value="2">2</option>
                <option value="3" selected>3</option><option value="4">4</option>
                <option value="5">5</option>
            </select>
            <label for="rainDropRadius">빗방울 크기:</label>
            <select id="rainDropRadius">
                <option value="1">1</option><option value="2">2</option>
                <option value="3" selected>3</option><option value="4">4</option>
                <option value="5">5</option>
            </select>


            <label for="animationSpeed">애니메이션 속도:</label>
            <select id="animationSpeed">
                <option value="0">애니메이션 안함</option>
                <option value="1" selected>1</option><option value="2">2</option>
                <option value="3">3</option><option value="4">4</option>
                <option value="5">5</option>
            </select>

            <button id="btnReset" type="button">설정!</button>
            <button id="btnStop" type="button">정지</button>
            <button id="btnBirdView" type="button">맞은 비 보기</button>
        </div>

        <div id="help" style="display: none">비올 때 걷거나 뛰는 속력에 따른 비 맞는 양을 보기 위한 시뮬레이션입니다.

화면 아래 쪽의 여러 조건에 따라 시뮬레이션을 달리 해보실 수 있고 애니메이션으로 실행한 경우 [맞은 비 보기]를 눌러 전체 비의 양 대비 맞은 비의 양을 시각적으로 확인하실 수 있습니다. 소년은 비를 한 방울이라도 맞는 시점에야 움직이기 시작합니다.

본 프로그램은 HTML5 기반이므로 인터넷 익스플로러의 경우 버전 9 이상이어야 합니다.
        </div>

        <div style="text-align: center; margin-top: 1em;">
            (c) 2014, Dylan Yi<br> <a href="https://start.goodtime.co.kr" target="_blank">Nothing New Under the Sun</a>
        </div>

    <img id="boy_image" src="boy_running.png" style="position: absolute; width: -1000px; top: -1000px">

    <script src="//code.jquery.com/jquery-1.10.2.min.js"></script>
    <script src="canvas.js?1111"></script>

    <script>
/**
 * Hammersley 수열
 * 0: 0, 1: .5, 2: .25, 3: .75, 4: .125, 5: .675, ...
 */
function hammersleySequence(i) {
    return inverseBits(i) / 0x100000000;
}

function inverseBits(i) {
    i = Number(i).toString(2);
    i = new Array(33 - i.length).join('0') + i;
    return parseInt(i.split('').reverse().join(''), 2);

    // 아래는 http://holger.dammertz.org/stuff/notes_HammersleyOnHemisphere.html
    // 참고하여 JavaScript로 변환한 루틴. >>> 0은 부호 없는 연산이 되게 한다.
    // i = (((i << 16) >>> 0) | (i >>> 16)) >>> 0;
    // i = ((((i & 0x55555555) << 1) >>> 0) | ((i & 0xAAAAAAAA) >>> 1)) >>> 0;
    // i = ((((i & 0x33333333) << 2) >>> 0) | ((i & 0xCCCCCCCC) >>> 2)) >>> 0;
    // i = ((((i & 0x0F0F0F0F) << 4) >>> 0) | ((i & 0xF0F0F0F0) >>> 4)) >>> 0;
    // i = ((((i & 0x00FF00FF) << 8) >>> 0) | ((i & 0xFF00FF00) >>> 8)) >>> 0;
    // return i;
}

$(function() {
    boyCanvas = new Canvas2D('boyCanvas'),
        rainCanvas = new Canvas2D('rainCanvas'),
        boyImage = document.getElementById('boy_image')
        ;

    function RainRun(width, height) {
        this.RunLength = 2000;
        this.RainColor = '#99f';
        this.RainHitColor = '#f00';
        this.ViewWidth = width;
        this.ViewHeight = height;
    };

    RainRun.prototype.reset = function () {
        // 이미 애니메이션 중이면 재진입 방식이 되어 애니메이션이 가속되는 문제 발생
        if (this.AnimationSpeed > 0) {
            this.AnimationSpeed = 0;
            var _this = this;
            _requestAnimationFrame(function() { _this.reset(); });
            return;
        }

        $('#canvasContainer').css('height', '240px');
        $('#boyCanvas').show();
        $('#scrollBar').show();
        $('#rainCanvas').css({
            transition: 'none',
            transform: 'none'
        });

        this.MaxVx = .4;
        this.Vx = Number($('#rainSpeed').val()) / 5; // 비의 가로 속도
        this.Vy = 1; // 비의 세로 속도
        this.CanvasWidth = this.ViewWidth + this.RunLength * this.MaxVx;
        this.CanvasHeight = this.RunLength * this.Vy + 240;
        this.X0 = this.Vx <= 0 ? 0 : this.CanvasWidth - this.ViewWidth;
        this.Y0 = this.RunLength * this.Vy;
        this.StartTime = Date.now();
        this.RunSpeed = $('#runSpeed').val() / 2;
        this.RainDensity = Number($('#rainDensity').val() / 5);
        this.RainDropRadius = 2 + Number($('#rainDropRadius').val());
        this.AnimationSpeed = Number($('#animationSpeed').val()) * 2;
        if (navigator.userAgent.indexOf('Chrome') < 0)
            this.AnimationSpeed *= .75;
        this.HitCount = 0;

        $('#scroller').css(
            'width', ($('#scrollBar').width() + this.RunLength) + 'px'
        );
        $('#scrollBar').prop('scrollLeft', 0);
        $('#rainCanvas').css({
            left: -this.X0 + 'px',
            width: this.CanvasWidth + 'px',
            top: (-this.RunLength * this.Vy - 240 + this.ViewHeight) + 'px',
            height: (this.RunLength * this.Vy + 240) + 'px'
        });
        rainCanvas.canvasContext.canvas.width = this.CanvasWidth;
        rainCanvas.canvasContext.canvas.height = this.CanvasHeight;

        this.RainDrops = [];
        for (var i = 0, count = 2000 * this.RainDensity; i < count; ++i) {
            this.RainDrops.push({
                type: 'circle',
                cx: hammersleySequence(i) * this.CanvasWidth,
                cy: this.Y0 - i / this.RainDensity * this.RunLength / 2000,
                r: this.RainDropRadius,
                color: this.RainColor
            })
        }

        rainCanvas.draw(this.RainDrops);

        var _this = this, time = parseInt($('#scrollBar').prop('scrollLeft'));
        function play() {
            time += _this.AnimationSpeed;
            if (time < _this.RunLength && boyImage.left < _this.ViewWidth) {
                $('#scrollBar').prop('scrollLeft', time);
                _this.update(time);

                if (_this.AnimationSpeed > 0)
                    _requestAnimationFrame(play);
            } else {
                _this.AnimationSpeed = 0;
                $('#btnStop').hide();
                $('#btnBirdView').show();
            }
        }
        _requestAnimationFrame(play);

        if (this.AnimationSpeed > 0) {
            $('#btnStop').show();
        } else {
            $('#btnStop').hide();
        }
        $('#btnBirdView').hide();
    }

    RainRun.prototype.update = function (t) {
        $('#rainCanvas').css({
            left: (-this.X0 + this.Vx * t) + 'px',
            top: (-this.Y0 + this.Vy * t) + 'px'
        });

        boyImage.left = (boyImage.startTime && t > boyImage.startTime ? (t - boyImage.startTime) : 0) * this.RunSpeed;
        boyCanvas.draw([boyImage]);

        var bitmap = boyCanvas.canvasContext.getImageData(0, 0, this.ViewWidth, this.ViewHeight).data;

        var arrUpdate = [];
        for (var i = 0, count = this.RainDrops.length; i < count; ++i) {
            var rd = this.RainDrops[i],
                x = (rd.cx - this.X0 + this.Vx * t) | 0,
                y = (rd.cy - this.Y0 + this.Vy * t) | 0
                ;

            // check alpha
            if (x >= 0 && y >= 0 && x < this.ViewWidth && y < this.ViewHeight
                && bitmap[(this.ViewWidth * y + x) * 4 + 3] > 0) {
                if (rd.color != this.RainHitColor) {
                    rd.color = this.RainHitColor;
                    this.HitCount++;
                    arrUpdate.push(rd);
                }
                if (!boyImage.startTime)
                    boyImage.startTime = t;
            }
        }
        rainCanvas.draw(arrUpdate, true);

        $('#hitCount').text(this.HitCount);
    };

    rainRun = new RainRun(
        $('#boyCanvas').width(),
        $('#boyCanvas').height()
        )
        ;

    boyImage.top = rainRun.ViewHeight - boyImage.height;
    boyImage.left = 0;
    setTimeout(function() { rainRun.reset(); }, 1000);

    $('#btnReset').click(function() {
        rainRun.reset();
    });

    $('#btnStop').click(function() {
        rainRun.AnimationSpeed = 0;
        $(this).hide();
        $('#btnBirdView').show();
    });

    $('#scrollBar').on('scroll', function() {
        var t = this.scrollLeft;
        rainRun.update(t);
    });

    $('#btnBirdView').click(function() {
        $('#canvasContainer').css('height', '740px');
        $('#boyCanvas').hide();
        $('#scrollBar').hide();
        $('#rainCanvas').css({
            left: -(rainRun.CanvasWidth - 900) / 2 + 'px',
            top: -(rainRun.CanvasHeight - 740 - 80) / 2 + 'px',
            transform: 'scale(.36, .36)',
            transition: 'all 1.6s ease-in-out'
        })
    });

});

function help() {
    alert($('#help').text());

    return false;
}
    </script>
</body>
</html>
